df_id: DF-LEXVANCE-CONTRACTS-MANAGER
df_name: lexvance-contracts-manager
version: 0.1.0-SKELETON
status: SKELETON-CONDITIONAL
crux-mk: true
description: 'Contracts-Manager fuer Vertragsmanagement quer ueber 6 Vertrags-Kategorien:

  B2B-MSA + AGB (§§ 305-310 BGB Inhaltskontrolle) + NDA + Lizenz (IP/OSS-Compliance)

  + HR (Arbeitsvertraege + Bonus + Aufhebung) + M&A (LOI + SPA + Closing).

  Output: Vertrags-Inventar mit Klausel-Cross-Reference + AGB-Update-Tracker.

  '
default_action:
  description: 'Pro Vertrag: Klausel-Audit + AGB-Inhaltskontrolle + IP-Compliance
    + Cross-Reference zu df-101'
  rho_per_run_eur: 150
  block_gates:
  - gate_id: K13_PAV
    block_reason: M&A-Vertraege = K_0-naehe, PHRONESIS_TICKET Pflicht
    false_block_cost_eur: 800
    legitimate_block_condition: kategorie='M&A' UND PHRONESIS_TICKET fehlt
  - gate_id: K11
    block_reason: Mandanten-Vertraege Cross-Read verboten ohne Tenant-Isolation
    false_block_cost_eur: 300
    legitimate_block_condition: Tenant-Context fehlt
  graceful_degradation_path: Mock-Vertrags-Audit ohne Real-Klausel-Discovery (df-104
    disabled)
tier_2_check:
  lambda_per_month_estimate: 25
  narrow_scope: Vertrags-Audit ueber 6 Kategorien (B2B/AGB/NDA/Lizenz/HR/M&A) mit
    Klausel-Cross-Ref
  determinism: 0.85
  rollback_seconds: 30
  test_coverage_target: 0.85
  k0_protected: true
  q0_measurable: true
  escalation_after_n_fails: 3
  rho_budget_eur_day: 5
  audit_trail: branch-hub/audit/df-lexvance-contracts-manager.jsonl
k11_cascade_containment:
  cascade_isolation: hard
  failure_blast_radius: 1
  dependency_dlq_strategy: skip-vertrag-resume-naechster + jsonl-log
k12_distillation_resistenz:
  output_feeds_into_training: false
  provenance_required_in_output: true
  non_llm_validation_layer: Klausel-Vollstaendigkeits-Check (Pflicht-Klauseln pro
    Kategorie) + BGB-Inhaltskontrolle
k13_independent_ground_truth:
  external_anchor_type: bgb_corpus + agb_inhaltskontrolle_db + github_api
  external_anchor_validation_frequency: monatlich
  pre_action_domain_check:
    env_tag: dev|staging|prod via DF_LEXVANCE_CONTRACTS_ENV
    mount_point: branch-hub/lexvance/vertraege/ + Klausel-Library (df-101-Integration)
    network_region: n/a
  pre_action_backup_check:
    backup_status: Vertraege read-only (kein Mutation)
    replication_lag: n/a
  pre_action_blast_radius_check:
    blast_radius: max 1 Vertrag pro Run (read-only)
    reversibility_class: state-only
k14_human_override_decay:
  override_complexity: requires_understanding
  override_documentation_freshness_days: 14
  martin_review_cadence: pro M&A + pro AGB-Update
  bus_factor_handover_drilled: false
k15_entropy_budget:
  entropy_added_loc_estimate: 270
  entropy_added_concepts:
  - VertragsAuditor
  - KlauselCrossReferencer
  - AgbInhaltskontrolleChecker
  - IpComplianceChecker
  entropy_justified_by_rho: 3.5x (AGB-Inhaltskontrolle-Schaden-Vermeidung + IP-Compliance
    + M&A-Closing-Risk)
  entropy_subtractive_potential: ersetzt manuelles Vertrags-Audit pro Kategorie
k16_concurrent_spawn_mutex:
  concurrent_spawn_protection: both
  lock_dir: /tmp/df-lexvance-contracts-manager.lock
  lock_stale_age_h: 6
  engine_pgrep_check: true
  lock_release_on: EXIT_INT_TERM
lose_coupling:
  LC1_graceful_degradation:
    degradation_modes:
    - full
    - degraded_klausel
    - degraded_agb_db
    - standalone
    degradation_test_required: true
  LC2_direct_mode:
    direct_mode_available: true
    direct_mode_capability: 0.75
    direct_mode_trigger: df-101-API-Timeout oder AGB-DB-Drift
  LC3_circuit_breaker:
    circuit_breaker_timeout_s: 30
    circuit_breaker_open_threshold: 3
    circuit_breaker_half_open_test_interval_s: 300
  LC4_failure_isolation:
    state_externalization: true
    idempotent_operations: true
    dependency_dlq_separate: true
  LC5_health_check:
    health_check_dependencies: []
    health_check_degraded_score: 0.6
    health_check_endpoint_or_file: /tmp/df-lexvance-contracts-manager-health.json
env_var_gating:
  DF_LEXVANCE_CONTRACTS_REAL_ENABLED: false
  PHRONESIS_TICKET_REQUIRED: true
  default_mode: mock
operations:
  output_path: ~/Projects/dark-factories/df-lexvance-contracts-manager/
  state_file: ~/.df-lexvance-contracts-manager/state.json
  jsonl_audit_path: branch-hub/audit/df-lexvance-contracts-manager.jsonl
  stop_flag_path: /tmp/df-lexvance-contracts-manager.stop
  health_file_path: /tmp/df-lexvance-contracts-manager-health.json
  schedule: Continuous (per Vertrag on-demand) + Weekly Sweep neue AGB-Versionen
rho_estimate:
  annual_eur: 90000
  reason: AGB-Inhaltskontrolle-Schaden-Vermeidung + IP-Compliance + M&A-Closing-Risk-Reduktion
  schwer_quantifizierbar: true
crux_bindung:
  K_0: GESCHUETZT (M&A-Closing-Risk + IP-Compliance-Schaden-Vermeidung)
  Q_0: epistemische Integritaet (Klausel-Cross-Reference via df-101)
  I_min: strukturierte 6-Kategorien-Pipeline (270 LOC + Tests)
  W_0: LexVance-Stunden reduziert via Pre-Filter Vertrags-Audit
activation_gates:
  internal_real_mode:
    env_var: DF-LEXVANCE-CONTRACTS-MANAGER_INTERNAL_REAL_ENABLED
    default: false
    description: Echte Daten-Verarbeitung lokal/sandbox, KEIN External-Output
    requires:
    - DF_INTERNAL_REAL_ENABLED=true
  external_real_mode:
    env_var: DF-LEXVANCE-CONTRACTS-MANAGER_REAL_ENABLED
    default: false
    description: Real-Mode mit External-Output (Sign-Off Pflicht)
    requires:
      phronesis_ticket_env: PHRONESIS_TICKET
      signoff_id_env: ANWALT_SIGNOFF_ID
      rdg_gate_env: DC_W49_5_RDG_GATE
      rdg_gate_value: approved
  external_output_gate:
    env_var_signoff_id: ANWALT_SIGNOFF_ID
    default: BLOCKED
    description: Mechanischer Block fuer External-Communication ohne Sign-Off
output_pipe_block:
- send_email_external
- partner_notify_external
- gericht_upload
- behoerde_submit
- mandant_external_communication
- gegner_anwalt_notify
- draft_publish_external
